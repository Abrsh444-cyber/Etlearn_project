name: Build EthioLearn APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config
        run: |
          mkdir apk-build
          cat > apk-build/twa-manifest.json << 'EOF'
          {
            "packageId": "com.ethiolearn.pro",
            "host": "etlearn-project-kxvp.vercel.app",
            "name": "EthioLearn Pro",
            "launcherName": "EthioLearn",
            "display": "fullscreen",
            "themeColor": "#d4af37",
            "navigationColor": "#1a1a1a",
            "backgroundColor": "#1a1a1a",
            "startUrl": "/",
            "iconUrl": "https://etlearn-project-kxvp.vercel.app/icon-512.png",
            "maskableIconUrl": "https://etlearn-project-kxvp.vercel.app/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "android.keystore",
              "alias": "ethiolearn"
            },
            "useBrowserOnChromeOS": false,
            "splitConfig": false,
            "webManifestUrl": "https://etlearn-project-kxvp.vercel.app/manifest.webmanifest"
          }
          EOF

      - name: Generate keystore
        run: |
          cd apk-build
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias ethiolearn \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ethiolearn123 \
            -keypass ethiolearn123 \
            -dname "CN=EthioLearn Pro, OU=Education, O=EthioLearn, L=Wolkite, S=SNNPR, C=ET"

      - name: Build APK with Bubblewrap
        run: |
          cd apk-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath android.keystore \
            --signingKeyAlias ethiolearn \
            --ksPass ethiolearn123 \
            --keyPass ethiolearn123
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EthioLearn-Pro-APK
          path: apk-build/app-release-signed.apk
          retention-days: 30
