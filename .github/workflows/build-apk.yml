name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      BUBBLEWRAP_INSTALL_JDK: "false"   # This prevents the interactive JDK prompt in all steps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap (if not already done)
        run: |
          if [ ! -f "bubblewrap.config.json" ]; then
            echo "Initializing Bubblewrap configuration..."
            bubblewrap init --manifest https://etlearn-project-kxvp.vercel.app/manifest.webmanifest \
              --name "Etlearn" \
              --display-mode fullscreen \
              --theme-color "#000000" \
              --background-color "#ffffff" \
              --shortcut "Etheem"
          else
            echo "Bubblewrap configuration already exists."
          fi

      - name: Generate or Update Keystore
        run: |
          if [ ! -f "keystore.jks" ]; then
            echo "Generating new keystore..."
            keytool -genkey -v -keystore keystore.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias etheem-alias \
              -dname "CN=Etheem, OU=Dev, O=Abrsl, L=City, S=State, C=US" \
              -storepass ${{ secrets.Abmans199698@ }} \
              -keypass ${{ secrets.Abmans199698@ }}
          else
            echo "Keystore already exists."
          fi

      - name: Build APK with Bubblewrap
        run: bubblewrap build

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: etheem-apk
          path: app/release/*.apk
          if-no-files-found: warn
