name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'  # Optional: if using Gradle

      - name: Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config
        run: |
          bubblewrap init --
