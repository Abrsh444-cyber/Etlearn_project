name: Build EthioLearn APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir apk-build
          cd apk-build
          echo "No" | bubblewrap init \
            --manifest https://etlearn-project-kxvp.vercel.app/manifest.webmanifest \
            --directory .
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build APK
        run: |
          cd apk-build
          echo "No" | bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EthioLearn-Pro-APK
          path: apk-build/app-release-signed.apk
          retention-days: 30
