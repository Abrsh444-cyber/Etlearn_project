<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EthioLearn" />
    <link rel="apple-touch-icon" href="/ethiolearn_icon.jpg" />
    <title>EthioLearn Pro | Premium AI Learning Platform</title>
    <!-- Chart.js CDN requested by user -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="/manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[Service Worker] Registered successfully:', reg.scope))
            .catch((err) => console.error('[Service Worker] Registration failed:', err));
        });
      }
    </script>
  </head>
  <body class="bg-[#0D0D0D] text-[#F0EDE8]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
